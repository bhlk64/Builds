name: Build Blink UF2

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Install dependencies
      run: |
        sudo apt update
        sudo apt install -y gcc-arm-none-eabi cmake build-essential python3

    - name: Clone Pico SDK
      run: |
        git clone https://github.com/raspberrypi/pico-sdk.git
        cd pico-sdk
        git submodule update --init

    - name: Set PICO_SDK_PATH
      run: echo "PICO_SDK_PATH=$GITHUB_WORKSPACE/pico-sdk" >> $GITHUB_ENV

    - name: Debug SDK path
      run: |
        echo $PICO_SDK_PATH
        ls $PICO_SDK_PATH

    - name: Build
      run: |
        mkdir build
        cd build
        cmake .. -DPICO_SDK_PATH=$PICO_SDK_PATH
        make -j$(nproc)

    - name: Upload UF2
      uses: actions/upload-artifact@v4
      with:
        name: blink-uf2
        path: build/*.uf2