name: Build Blink UF2

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Install dependencies
      run: |
        sudo apt update
        sudo apt install -y gcc-arm-none-eabi cmake build-essential python3

    - name: Set PICO_SDK_PATH
      run: echo "PICO_SDK_PATH=${GITHUB_WORKSPACE}/pico-sdk" >> $GITHUB_ENV
  
    - name: Create build directory
      run: mkdir -p build

    - name: Run CMake
      working-directory: build
      run: cmake ..

    - name: Build blink.uf2
      working-directory: build
      run: make -j$(nproc)

    - name: Upload blink.uf2 artifact
      uses: actions/upload-artifact@v4
      with:
        name: blink-uf2
        path: build/blink.uf2

