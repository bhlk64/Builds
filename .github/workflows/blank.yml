name: RP2040 Blink Build

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Clone example
      - name: Checkout pico-examples
        uses: actions/checkout@v4
        with:
          repository: raspberrypi/pico-examples
          path: pico-examples

      # 2️⃣ Clone SDK (WITH submodules)
      - name: Checkout pico-sdk
        uses: actions/checkout@v4
        with:
          repository: raspberrypi/pico-sdk
          path: pico-sdk
          submodules: recursive

      # 3️⃣ Install toolchain + CMake
      - name: Install CMake + ARM Toolchain
        run: |
          sudo apt update
          sudo apt install -y cmake gcc-arm-none-eabi build-essential

      # 4️⃣ Build blink example
      - name: Build blink example
        run: |
         export PICO_SDK_PATH=$GITHUB_WORKSPACE/pico-sdk
         mkdir -p pico-examples/build
         cd pico-examples/build
         cmake .. -DPICO_BOARD=raspberrypi_pico
         cmake --build . -j$(nproc)

      # 5️⃣ Upload UF2 artifact
      - name: Upload UF2
        uses: actions/upload-artifact@v4
        with:
          name: blink-uf2
          path: pico-examples/build/blink/blink.uf2
